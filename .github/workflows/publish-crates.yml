name: Publish Crate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish dry-run only
        type: boolean
        required: true
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish agentprey crate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Run preflight checks
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Verify publish package
        run: cargo publish --manifest-path cli/Cargo.toml --locked --dry-run

      - name: Publish to crates.io
        if: ${{ !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --manifest-path cli/Cargo.toml --locked
