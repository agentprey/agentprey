name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: agentprey
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: agentprey
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: agentprey.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build release binary
        run: cargo build --manifest-path cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          package_dir="dist/agentprey-${{ matrix.target }}"
          mkdir -p "$package_dir/scripts"
          cp "cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$package_dir/${{ matrix.binary_name }}"
          cp -R vectors "$package_dir/vectors"
          cp README.md "$package_dir/README.md"
          cp CHANGELOG.md "$package_dir/CHANGELOG.md"
          cp scripts/mock_agent.py "$package_dir/scripts/mock_agent.py"
          cp scripts/beta_smoke.sh "$package_dir/scripts/beta_smoke.sh"
          cp scripts/openclaw_smoke.sh "$package_dir/scripts/openclaw_smoke.sh"
          cp scripts/release_candidate_smoke.sh "$package_dir/scripts/release_candidate_smoke.sh"
          tar -C dist -czf "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}" "agentprey-${{ matrix.target }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "dist/agentprey-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "$packageDir/scripts" -Force | Out-Null
          Copy-Item "cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$packageDir/${{ matrix.binary_name }}"
          Copy-Item "vectors" "$packageDir/vectors" -Recurse
          Copy-Item "README.md" "$packageDir/README.md"
          Copy-Item "CHANGELOG.md" "$packageDir/CHANGELOG.md"
          Copy-Item "scripts/mock_agent.py" "$packageDir/scripts/mock_agent.py"
          Copy-Item "scripts/beta_smoke.sh" "$packageDir/scripts/beta_smoke.sh"
          Copy-Item "scripts/openclaw_smoke.sh" "$packageDir/scripts/openclaw_smoke.sh"
          Copy-Item "scripts/release_candidate_smoke.sh" "$packageDir/scripts/release_candidate_smoke.sh"
          Compress-Archive -Path "$packageDir" -DestinationPath "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}" -Force

      - name: Write checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}" > "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256"

      - name: Write checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}"
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Set-Content "$archive.sha256"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: agentprey-${{ matrix.target }}
          path: |
            agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}
            agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

      - name: Attach archive to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          files: |
            agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}
            agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
