name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: agentprey
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: agentprey
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: agentprey.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build release binary
        run: cargo build --manifest-path cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          tar -C dist -czf "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}" "${{ matrix.binary_name }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "cli/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: agentprey-${{ matrix.target }}
          path: agentprey-${{ matrix.target }}.${{ matrix.archive_ext }}
